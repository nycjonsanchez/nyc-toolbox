<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NY Connection — Toolbox</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #ffffff;
    --surface:  #f6f6f6;
    --card:     #ffffff;
    --border:   #e0e0e0;
    --border2:  #cccccc;
    --red:      #cd040b;
    --red-dim:  #cd040b12;
    --red-mid:  #cd040b22;
    --black:    #000000;
    --text:     #1a1a1a;
    --muted:    #767676;
    --pill:     #f6f6f6;
    --amber:    #cd040b;
    --amber-dim:#cd040b12;
  }

  html, body {
    background: var(--surface);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── RESPONSIVE WRAPPER ── */
  .app-shell {
    max-width: 500px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    position: relative;
  }

  /* ── TABLET: side-by-side layout ── */
  @media (min-width: 768px) {
    .app-shell {
      max-width: 100%;
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "header header"
        "sidebar main";
    }
    .header { grid-area: header; }
    .sidebar-nav { grid-area: sidebar; display: flex !important; }
    .content { grid-area: main; padding: 0 0 40px; }
    .fab { display: none !important; }
    .menu-overlay { display: none !important; }
    .menu-drawer { display: none !important; }
  }

  /* ── DESKTOP ── */
  @media (min-width: 1100px) {
    .app-shell {
      grid-template-columns: 280px 1fr;
    }
    .link-grid { grid-template-columns: repeat(4, 1fr); }
    .store-list { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .forms-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .section-header { padding: 28px 28px 12px; }
    .search-wrap { padding: 0 28px 16px; }
    .link-grid { padding: 0 28px; }
    .store-list { padding: 0 28px; }
    .kpi-grid { padding: 0 28px; }
    .forms-list { padding: 0 28px; }
    .kpi-section-label { padding: 20px 28px 10px; }
    .sync-bar { padding: 0 28px 12px; }
  }

  /* ── SIDEBAR NAV (tablet+) ── */
  .sidebar-nav {
    display: none;
    flex-direction: column;
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 0;
    height: calc(100vh - 59px);
    overflow-y: auto;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 24px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .15s, border-color .15s;
    text-decoration: none;
  }
  .sidebar-item:hover { background: var(--surface); }
  .sidebar-item.active {
    background: var(--red-dim);
    border-left-color: var(--red);
  }
  .sidebar-item.active .sidebar-label { color: var(--red); font-weight: 700; }
  .sidebar-icon { font-size: 20px; width: 28px; text-align: center; }
  .sidebar-label { font-size: 15px; font-weight: 500; color: var(--text); }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--black);
    border-bottom: none;
    padding: 14px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
  }
  .logo-mark {
    font-family: 'Inter', sans-serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: -0.5px;
    color: #ffffff;
    line-height: 1;
  }
  .logo-mark span { color: var(--red); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e88;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: .4; }
  }
  .header-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: #aaaaaa; letter-spacing: .5px;
  }

  /* ── NAV TABS (removed) ── */

  /* ── CONTENT ── */

  .section { display: none; animation: fadeUp .25s ease; }
  .section.active { display: block; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 20px 20px 8px;
    display: flex; align-items: baseline; gap: 10px;
  }
  .section-title {
    font-family: 'Inter', sans-serif;
    font-size: 24px; font-weight: 900; letter-spacing: -0.5px; color: var(--text);
  }
  .section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--red);
  }

  /* ── SEARCH ── */
  .search-wrap { padding: 0 20px 16px; }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--red); }

  /* ── STORE CARDS ── */
  .store-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
  .store-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .store-card:active { transform: scale(.985); }
  .store-card:hover { border-color: var(--red); }
  .store-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .store-name { font-weight: 700; font-size: 15px; line-height: 1.2; color: var(--text); }
  .store-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 3px 8px; border-radius: 100px;
    font-weight: 600; letter-spacing: .5px;
  }
  .badge-vz { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .badge-ups { background: #f5a62315; color: #b87a00; border: 1px solid #f5a62366; }
  .store-meta { display: flex; flex-direction: column; gap: 4px; }
  .store-meta-row { display: flex; gap: 6px; align-items: center; }
  .meta-icon { font-size: 12px; }
  .meta-text { font-size: 12px; color: var(--muted); }
  .store-actions { display: flex; gap: 8px; margin-top: 12px; }
  .store-btn {
    flex: 1; padding: 8px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text); font-size: 12px; font-weight: 600;
    cursor: pointer; text-align: center;
    text-decoration: none; display: block;
    transition: background .2s;
  }
  .store-btn:active { background: var(--border); }
  .store-btn.primary { background: var(--red); border-color: var(--red); color: #fff; }

  /* ── QUICK LINKS ── */
  .link-grid {
    padding: 0 16px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .link-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px;
    text-decoration: none;
    display: flex; flex-direction: column; gap: 12px;
    transition: border-color .2s, transform .15s, box-shadow .2s;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    min-height: 110px;
    justify-content: space-between;
  }
  .link-card:active { transform: scale(.97); }
  .link-card:hover { border-color: var(--red); box-shadow: 0 2px 12px rgba(205,4,11,0.1); }
  .link-icon {
    font-size: 26px;
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .link-icon.red { background: var(--red-dim); }
  .link-icon.amber { background: #f5a62315; }
  .link-icon.blue { background: #3b82f615; }
  .link-icon.green { background: #22c55e15; }
  .link-icon.purple { background: #a855f715; }
  .link-icon.teal { background: #14b8a615; }
  .link-label { font-size: 14px; font-weight: 700; line-height: 1.3; color: var(--text); }
  .link-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  @media (min-width: 480px) {
    .link-grid { grid-template-columns: repeat(3, 1fr); padding: 0 16px; }
  }

  /* ── FORMS / CHECKLISTS ── */
  .forms-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
  .form-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 15px 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .form-row:active { transform: scale(.985); }
  .form-row:hover { border-color: var(--red); }
  .form-icon-wrap {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .form-info { flex: 1; }
  .form-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .form-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .form-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 3px 8px; border-radius: 100px;
    color: var(--muted); background: var(--surface); border: 1px solid var(--border);
    white-space: nowrap;
  }
  .form-arrow { color: var(--muted); font-size: 16px; }

  /* ── KPI REFERENCES ── */
  .kpi-section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 16px 20px 8px;
  }
  .kpi-grid { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .kpi-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .kpi-name { font-size: 14px; font-weight: 800; color: var(--text); }
  .kpi-target {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--red); font-weight: 600;
  }
  .kpi-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
  .kpi-tip {
    font-size: 12px;
    background: var(--red-dim);
    border: 1px solid var(--red-mid);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    line-height: 1.5;
  }
  .kpi-tip-label {
    font-size: 10px; font-weight: 800; color: var(--red);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px;
  }

  /* ── SYNC BAR ── */
  .sync-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px 12px;
  }
  .sync-meta { display: flex; align-items: center; gap: 7px; }
  .sync-status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border2); flex-shrink: 0;
  }
  .sync-status-dot.ok { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }
  .sync-status-dot.err { background: var(--red); }
  .sync-status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  .sync-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .refresh-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 14px; border-radius: 100px;
    border: 1px solid var(--red);
    background: var(--red-dim);
    color: var(--red); font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'Inter', sans-serif;
    transition: background .2s;
  }
  .refresh-btn:active { background: var(--red-mid); }
  .refresh-btn:disabled { opacity: .5; pointer-events: none; }
  #refreshIcon { font-size: 14px; display: inline-block; transition: transform .4s; }
  #refreshIcon.spinning { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SETUP BANNER ── */
  .setup-banner {
    margin: 0 20px 12px;
    background: #fffbeb;
    border: 1px solid #fcd34d;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #92400e;
    line-height: 1.5;
  }
  .setup-banner strong { display: block; margin-bottom: 3px; font-size: 13px; }



  .content { padding: 0 0 80px; background: var(--surface); min-height: 100vh; overflow-y: auto; }

  /* ── FAB BUTTON ── */
  .fab {
    position: fixed; bottom: 28px; right: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--red);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(205,4,11,0.35);
    z-index: 200;
    transition: transform .2s, background .2s;
  }
  .fab:active { transform: scale(.92); }
  .fab-icon { font-size: 22px; line-height: 1; transition: transform .25s; color: #fff; }
  .fab.open .fab-icon { transform: rotate(90deg); }

  /* ── OVERLAY ── */
  .menu-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 150;
    backdrop-filter: blur(2px);
  }
  .menu-overlay.visible { display: block; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* ── DRAWER ── */
  .menu-drawer {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
    width: 100%; max-width: 430px;
    background: #fff;
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    z-index: 200;
    padding: 12px 0 36px;
    transition: transform .3s cubic-bezier(.32,1,.24,1);
    box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
  }
  .menu-drawer.open { transform: translateX(-50%) translateY(0); }
  .drawer-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border2); margin: 0 auto 16px;
  }
  .drawer-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase;
    padding: 0 24px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .drawer-items { display: flex; flex-direction: column; }
  .drawer-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .drawer-item:last-child { border-bottom: none; }
  .drawer-item:active { background: var(--surface); }
  .drawer-item.active { background: var(--red-dim); border-left: 3px solid var(--red); }
  .drawer-item.active .drawer-label { color: var(--red); font-weight: 700; }
  .drawer-item.active .drawer-arrow { color: var(--red); }
  .drawer-icon { font-size: 20px; width: 28px; text-align: center; }
  .drawer-label { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); }
  .drawer-arrow { font-size: 20px; color: var(--muted); }
</style>
</head>

// ── CONFIG — paste your Apps Script Web App URL below ─────────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwld9SpF-uphNvs9mQzwGzJ90MTg8CDLvtVYGb7RP_GcOR3lifsNTTdiHoIowigqYF4/exec';

// ── STORE STATE ───────────────────────────────────────────────────
let storeData = [];

// ── FETCH STORES FROM GOOGLE SHEETS ───────────────────────────────
async function fetchStores() {
  const btn    = document.getElementById('refreshBtn');
  const icon   = document.getElementById('refreshIcon');
  const dot    = document.getElementById('syncDot');
  const label  = document.getElementById('syncLabel');
  const list   = document.getElementById('store-list');

  // Loading state
  btn.disabled = true;
  icon.classList.add('spinning');
  dot.className = 'sync-status-dot loading';
  label.textContent = 'Syncing...';

  if (SHEET_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    // Show setup instructions if URL not configured
    icon.classList.remove('spinning');
    btn.disabled = false;
    dot.className = 'sync-status-dot err';
    label.textContent = 'Not configured';
    list.innerHTML = `
      <div class="setup-banner">
        <strong>⚙️ Setup Required</strong>
        Replace <code>YOUR_APPS_SCRIPT_URL_HERE</code> in the app's JS with your
        Google Apps Script Web App URL. See the setup instructions above.
      </div>`;
    document.getElementById('store-count').textContent = '— STORES';
    return;
  }

  try {
    const res  = await fetch(SHEET_URL);
    const data = await res.json();

    storeData = data.filter(s => s.name); // skip blank rows
    renderStores(storeData);

    // Success state
    dot.className = 'sync-status-dot ok';
    const now = new Date();
    label.textContent = `Synced ${now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' })}`;
  } catch (e) {
    dot.className = 'sync-status-dot err';
    label.textContent = 'Sync failed — check URL';
    list.innerHTML = `<div class="setup-banner"><strong>❌ Could not load stores</strong>Check your Apps Script URL and make sure the deployment is set to "Anyone can access."</div>`;
    document.getElementById('store-count').textContent = '— STORES';
  }

  icon.classList.remove('spinning');
  btn.disabled = false;
}

// ── FILTER USES LOCAL storeData ───────────────────────────────────
function filterStores() {
  const q = document.getElementById('store-search').value.toLowerCase();
  if (!q) { renderStores(storeData); return; }
  renderStores(storeData.filter(s =>
    (s.name        || '').toLowerCase().includes(q) ||
    (s.address     || '').toLowerCase().includes(q) ||
    (s.phone       || '').toLowerCase().includes(q) ||
    (s['Store id'] || '').toString().toLowerCase().includes(q)
  ));
}

// ── RENDER ────────────────────────────────────────────────────────
function renderStores(list) {
  const el = document.getElementById('store-list');
  document.getElementById('store-count').textContent = `${list.length} STORES`;
  el.innerHTML = list.map(s => `
    <div class="store-card">
      <div class="store-card-header">
        <div class="store-name">${s.name}${s['Store id'] ? ' · ' + s['Store id'] : ''}</div>

        <div class="store-meta-row"><span class="meta-icon">📍</span><span class="meta-text">${s.address}</span></div>
        <div class="store-meta-row"><span class="meta-icon">📞</span><span class="meta-text">${s.phone}</span></div>
      </div>
      <div class="store-actions">
        <a class="store-btn" href="tel:${s.phone.replace(/\D/g,'')}">📞 Call</a>
        <a class="store-btn primary" href="https://maps.google.com/?q=${encodeURIComponent(s.address)}" target="_blank">🗺 Map</a>
      </div>
    </div>
  `).join('');
}

function renderLinks() {
  document.getElementById('link-grid').innerHTML = LINKS.map(l => {
    const clickAttr = l.onclick ? `onclick="${l.onclick}"` : '';
    const href = l.onclick ? 'javascript:void(0)' : l.url;
    return `
    <a class="link-card" href="${href}" ${clickAttr} ${!l.onclick ? 'target="_blank"' : ''}>
      <div class="link-icon ${l.color}">${l.icon}</div>
      <div>
        <div class="link-label">${l.label}</div>
        <div class="link-sub">${l.sub}</div>
      </div>
    </a>`;
  }).join('');
}

function renderForms(list) {
  document.getElementById('forms-list').innerHTML = list.map(f => `
    <div class="form-row">
      <div class="form-icon-wrap" style="background: var(--${f.color}-dim, var(--pill))">
        ${f.icon}
      </div>
      <div class="form-info">
        <div class="form-name">${f.name}</div>
        <div class="form-desc">${f.desc}</div>
      </div>
      <div class="form-tag">${f.tag}</div>
      <div class="form-arrow">›</div>
    </div>
  `).join('');
}

function renderKPIs() {
  document.getElementById('kpi-grid').innerHTML = KPIS.map(k => `
    <div class="kpi-card">
      <div class="kpi-top">
        <div class="kpi-name">${k.name}</div>
        <div class="kpi-target">${k.target}</div>
      </div>
      <div class="kpi-desc">${k.desc}</div>
      <div class="kpi-tip">
        <div class="kpi-tip-label">⚡ Floor Tip</div>
        ${k.tip}
      </div>
    </div>
  `).join('');
}

// ── FILTER FORMS ─────────────────────────────────────────────────
function filterForms() {
  const q = document.getElementById('form-search').value.toLowerCase();
  renderForms(FORMS.filter(f =>
    f.name.toLowerCase().includes(q) ||
    f.desc.toLowerCase().includes(q) ||
    f.tag.toLowerCase().includes(q)
  ));
}

// ── TABS ──────────────────────────────────────────────────────────
// ── MENU ──────────────────────────────────────────────────────────
function toggleMenu() {
  const drawer = document.getElementById('menuDrawer');
  const overlay = document.getElementById('menuOverlay');
  const fab = document.getElementById('fabBtn');
  const isOpen = drawer.classList.contains('open');
  if (isOpen) closeMenu();
  else {
    drawer.classList.add('open');
    overlay.classList.add('visible');
    fab.classList.add('open');
  }
}
function closeMenu() {
  document.getElementById('menuDrawer').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('visible');
  document.getElementById('fabBtn').classList.remove('open');
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.drawer-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + tab).classList.add('active');
  document.getElementById('dmenu-' + tab).classList.add('active');
  const sNav = document.getElementById('snav-' + tab);
  if (sNav) sNav.classList.add('active');
  closeMenu();
}

// ── DATE ──────────────────────────────────────────────────────────
function setDate() {
  const d = new Date();
  document.getElementById('headerDate').textContent =
    d.toLocaleDateString('en-US', { month:'short', day:'numeric' }).toUpperCase();
}

// ── BRINKS SMART REDIRECT ─────────────────────────────────────────
function openBrinks() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /android/i.test(ua);
  if (isIOS) {
    window.location = 'https://apps.apple.com/us/app/brinks-27seven/id1493685775';
  } else if (isAndroid) {
    window.location = 'https://play.google.com/store/apps/details?id=com.brinks.twentysevenseven';
  } else {
    window.open('https://play.google.com/store/apps/details?id=com.brinks.twentysevenseven', '_blank');
  }
}

// ── INIT ──────────────────────────────────────────────────────────
renderLinks();
renderKPIs();
setDate();

// Fetch immediately on load, then refresh every 5 minutes
fetchStores();
setInterval(fetchStores, 5 * 60 * 1000);

</script>
</div><!-- /app-shell -->
</body>
</html>
